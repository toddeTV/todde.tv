name: Build & Deploy

on:
  push:
    branches:
      - main
  schedule:
    # Twice a week: Monday 03:00 UTC and Thursday 03:00 UTC
    - cron: "0 3 * * 1"
    - cron: "0 3 * * 4"
  workflow_dispatch: {} # Allow manual trigger from GitHub UI

permissions:
  contents: read

# Cancel in-progress runs when a newer run is triggered (e.g. two PRs merged quickly).
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout the Codebase
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile --prefer-offline

      - name: Generate static site
        run: pnpm run build:ssg
        env:
          NUXT_PUBLIC_LEGAL_NAME: ${{ vars.NUXT_PUBLIC_LEGAL_NAME }}
          NUXT_PUBLIC_LEGAL_OCCUPATION: ${{ vars.NUXT_PUBLIC_LEGAL_OCCUPATION }}
          NUXT_PUBLIC_LEGAL_OCCUPATION_DE: ${{ vars.NUXT_PUBLIC_LEGAL_OCCUPATION_DE }}
          NUXT_PUBLIC_LEGAL_EMAIL: ${{ vars.NUXT_PUBLIC_LEGAL_EMAIL }}
          NUXT_PUBLIC_LEGAL_PHONE: ${{ vars.NUXT_PUBLIC_LEGAL_PHONE }}
          NUXT_PUBLIC_LEGAL_ADDRESS_STREET: ${{ vars.NUXT_PUBLIC_LEGAL_ADDRESS_STREET }}
          NUXT_PUBLIC_LEGAL_ADDRESS_CITY: ${{ vars.NUXT_PUBLIC_LEGAL_ADDRESS_CITY }}
          NUXT_PUBLIC_LEGAL_ADDRESS_COUNTRY: ${{ vars.NUXT_PUBLIC_LEGAL_ADDRESS_COUNTRY }}
          NUXT_PUBLIC_LEGAL_VAT_ID: ${{ vars.NUXT_PUBLIC_LEGAL_VAT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .output/public --project-name=todde-tv
