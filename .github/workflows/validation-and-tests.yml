name: Validation & Tests

on:
  # push:
  #   branches:
  #     - main
  pull_request:
    branches:
      - main

jobs:
  # This job validates that the PR title conforms to the Conventional Commit standard
  validate-pr:
    name: Validate PR Title
    # Only runs this job on pull_request events, no need to run on push events
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # This job runs all tests and checks using a matrix strategy
  run-checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    # The matrix strategy allows running different test configurations in parallel to run all, even if one fails
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint & Format Check
            command: vp run test:lint
          - name: Redirect Artifact Check
            command: vp run test:redirects
          - name: Type Check
            command: vp run test:types

    steps:
      # Check out the repository
      - name: Checkout the Codebase
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Install and set up Vite+ with Node and pnpm for use in the workflow
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa
        with:
          version: 0.1.19
          node-version: "24"
          cache: true
          run-install: false

      # Install project dependencies with automatic `nuxt prepare` at the end.
      # Thanks to the cache, this step is extremely fast on subsequent runs.
      - name: Install dependencies
        run: vp install --frozen-lockfile --prefer-offline

      # Execute the specific check command from the matrix
      - name: Run Check
        # could also run as `vp run test` as all commands are defined to run sequentially, but more control this way for now
        run: ${{ matrix.command }}

  # This job acts as a single, final status check for branch protection.
  all_checks_passed:
    name: All Validations & Tests Passed
    runs-on: ubuntu-24.04
    # We need to run this job regardless of the outcome of the dependent jobs
    # to be able to report a failure.
    if: always()
    needs:
      - validate-pr
      - run-checks
    steps:
      - name: Check status of dependent jobs
        run: |
          # The flexible approach: a job is also considered "passed" if it was intentionally skipped.
          # This is important for conditional jobs that should only run if specific files have changed
          # (e.g., using an `if:` condition). In such cases, 'skipped' is a valid, non-error state.
          # echo '<DOLLAR_SYMBOL>{{ toJSON(needs) }}' | jq -e 'all(.result == "success" or .result == "skipped")'

          # The strict approach: only 'success' is accepted. This will fail if any job is skipped.
          echo '${{ toJSON(needs) }}' | jq -e 'all(.result == "success")'
