name: Cloudflare Build & Deploy

on:
  push:
    branches:
      - main
  schedule:
    # Twice a week: Monday 03:00 UTC and Thursday 03:00 UTC
    - cron: "0 3 * * 1"
    - cron: "0 3 * * 4"
  workflow_dispatch: {} # Allow manual trigger from GitHub UI

permissions:
  contents: read

# Cancel in-progress runs when a newer run is triggered (e.g. two PRs merged quickly).
concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy on Cloudflare Pages
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout the Codebase
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa
        with:
          version: 0.1.19
          node-version: "24"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --prefer-offline

      - name: Generate static site
        run: vp run build:ssg
        env:
          NUXT_PUBLIC_LEGAL_NAME: ${{ vars.NUXT_PUBLIC_LEGAL_NAME }}
          NUXT_PUBLIC_LEGAL_OCCUPATION: ${{ vars.NUXT_PUBLIC_LEGAL_OCCUPATION }}
          NUXT_PUBLIC_LEGAL_OCCUPATION_DE: ${{ vars.NUXT_PUBLIC_LEGAL_OCCUPATION_DE }}
          NUXT_PUBLIC_LEGAL_EMAIL: ${{ vars.NUXT_PUBLIC_LEGAL_EMAIL }}
          NUXT_PUBLIC_LEGAL_PHONE: ${{ vars.NUXT_PUBLIC_LEGAL_PHONE }}
          NUXT_PUBLIC_LEGAL_ADDRESS_STREET: ${{ vars.NUXT_PUBLIC_LEGAL_ADDRESS_STREET }}
          NUXT_PUBLIC_LEGAL_ADDRESS_CITY: ${{ vars.NUXT_PUBLIC_LEGAL_ADDRESS_CITY }}
          NUXT_PUBLIC_LEGAL_ADDRESS_COUNTRY: ${{ vars.NUXT_PUBLIC_LEGAL_ADDRESS_COUNTRY }}
          NUXT_PUBLIC_LEGAL_VAT_ID: ${{ vars.NUXT_PUBLIC_LEGAL_VAT_ID }}

      - name: Deploy to Cloudflare Pages
        run: vp run deploy:cloudflare:page
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}

  post-deploy-smoke-test:
    name: Post-Deploy Smoke Test
    needs:
      - build-and-deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout the Codebase
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa
        with:
          version: 0.1.19
          node-version: "24"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --prefer-offline

      - name: Verify public routes
        env:
          BASE_URL: https://todde.tv
        run: vp run verify:cloudflare:smoke
